<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms Manifest</title>
</head>
<body>
    <!-- This file is for Netlify's build-time form detection -->
    
    <!-- Product Request Form / Waitlist -->
    <form name="product-request" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="tel" name="phone" />
        <input type="text" name="equipment" />
        <input type="text" name="city" />
        <input type="text" name="type" /> <!-- request or waitlist -->
        <input type="date" name="start-date" />
        <input type="text" name="duration" />
        <input type="text" name="with-operator" />
        <textarea name="notes"></textarea>
    </form>

    <!-- Supplier Signup Form -->
    <form name="supplier-signup" data-netlify="true" hidden>
        <input type="text" name="companyName" />
        <input type="text" name="contactName" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <input type="text" name="zone" />
        <input type="text" name="fleetTypes" />
        <input type="text" name="fleetSize" />
        <textarea name="notes"></textarea>
    </form>

    <!-- Generic Waitlist / Newsletter -->
    <form name="general-waitlist" data-netlify="true" hidden>
        <input type="email" name="email" />
        <input type="text" name="city" />
    </form>
</body>
</html>
